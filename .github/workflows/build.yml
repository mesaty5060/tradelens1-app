name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files and find Flutter project
        run: |
          ls -la
          find . -name pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Find Flutter project
        run: |
          PROJECT_PATH=$(dirname "$(find . -name pubspec.yaml | head -n 1)")
          echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
          echo "Flutter project path: $PROJECT_PATH"

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Build release APK
        run: flutter build apk --release --dart-define=FIREBASE_DATABASE_URL=https://tradelens-academy-default-rtdb.firebaseio.com
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeLens-Academy-APK
          path: ${{ env.PROJECT_PATH }}/build/app/outputs/flutter-apk/app-release.apk
