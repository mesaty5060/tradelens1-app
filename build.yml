name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: mobile_app

      - name: Build release APK
        run: flutter build apk --release --dart-define=FIREBASE_DATABASE_URL=https://tradelens-academy-default-rtdb.firebaseio.com
        working-directory: mobile_app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeLens-Academy-APK
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
